<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AceStream Player | Premium</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

  <header>
    <div class="logo">
      <i class="fas fa-bolt" style="color: #00ff88;"></i> <span>ACE<strong>GRID</strong></span>
    </div>
    
    <div class="search-container">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="search" placeholder="Buscar canal o deporte...">
    </div>
  </header>

  <nav id="categoryFilters" class="filters">
    <button class="filter-btn active" data-group="all">Todos</button>
    </nav>

  <main>
    <div class="grid" id="channelGrid">
      </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
